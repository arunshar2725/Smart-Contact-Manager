scm.default-profile-image=https://static.vecteezy.com/system/resources/previews/005/544/718/original/profile-icon-design-free-vector.jpg
# Externalized configurarions
app.base-url=${BASE_URL:http://localhost:8081}
#scm07.ap-south-1.elasticbeanstalk.com    base url


spring.application.name=scm2.0
server.port=${PORT:8081}
server.forward-headers-strategy=framework
spring.thymeleaf.cache=false
# mysql database configurations
#data source url
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:scm20}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:root1234}
#jpa configurations
spring.jpa.show-sql=${SHOW_SQL:false}
 #for creating schemas and tables
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}

spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:50MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:50MB}
spring.profiles.active=${ACTIVE_PROFILE:dev}
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true