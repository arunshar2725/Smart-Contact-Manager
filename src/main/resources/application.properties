spring.application.name=scm2.0
server.port=8081

#mysql database configurarions
#datasource url

# 1. Database URL (3306 default port hai aur scm20 aapke DB ka naam)
spring.datasource.url=jdbc:mysql://localhost:3306/scm20

# 2. Database Username (Aam taur par 'root' hota hai)
spring.datasource.username=root

# 3. Database Password (Jo aapne MySQL install karte waqt rakha tha)
spring.datasource.password=1234

# 4. Driver Class (MySQL ke liye)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 5. Hibernate settings (Ye table apne aap banane mein madad karta hai)
#important for creating tables automatically based on your entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
#dialect specify karna zaroori hai taaki Hibernate sahi SQL generate kar sake MySQL ke liye.
spring.output.ansi.enabled=ALWAYS
scm.manager.upload-dir=https://static.vecteezy.com/system/resources/previews/005/544/718/original/profile-icon-design-free-vector.jpg

#oauth2 client configuration

#google configure
spring.security.oauth2.client.registration.google.client-name=google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

#github configure
spring.security.oauth2.client.registration.github.client-name=github
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.scope=email,profile





