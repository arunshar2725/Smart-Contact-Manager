<!doctype html>
<html lang="en" th:replace="~{base::parent(~{::#content},~{::title},~{::script})}">
<head>
  <title>SignUp | SCM 2.0</title>
</head>
<body>
<div id="content">

  <div class="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-gray-950 px-4 py-5 relative overflow-hidden">

    <div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-blue-500/10 dark:bg-blue-600/10 blur-[120px] rounded-full pointer-events-none"></div>
    <div class="absolute bottom-[-10%] left-[-10%] w-[400px] h-[400px] bg-indigo-500/10 dark:bg-indigo-600/10 blur-[120px] rounded-full pointer-events-none"></div>

    <div class="max-w-xl w-full bg-white/80 dark:bg-gray-900/80 backdrop-blur-xl border border-gray-200 dark:border-gray-800 rounded-[2rem] p-8 md:p-10 shadow-2xl relative z-10 my-8">

      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-tr from-blue-700 to-blue-500  shadow-lg shadow-blue-500/30 mb-5">
          <i class="fa-solid fa-user-plus text-3xl"></i>
        </div>
        <h2 class="text-3xl font-extrabold text-gray-900 dark:text-white tracking-tight">Create an Account</h2>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-2 font-medium">Start Managing contacts on Cloud.</p>
      </div>

      <div id="alert-container">
        <div data-th-replace="~{message :: messagebox}"></div>
      </div>

      <form data-th-action="@{'/do-register'}" method="post" data-th-object="${userForm}" class="space-y-5" novalidate>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div>
            <label for="name" class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Full Name</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                <i class="fa-regular fa-user"></i>
              </div>
              <input type="text" id="name" data-th-field="*{name}" required placeholder="John Doe" class="w-full pl-11 pr-4 py-3 bg-gray-50 dark:bg-gray-950 border border-gray-200 dark:border-gray-800 rounded-xl text-gray-900 dark:text-white focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all placeholder-gray-400" />
            </div>
            <p data-th-if="${#fields.hasErrors('name')}" data-th-errors="*{name}" class="text-red-500 text-xs font-semibold mt-1.5 ml-1"></p>
          </div>

          <div>
            <label for="phone" class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Contact Number</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                <i class="fa-solid fa-phone text-sm"></i>
              </div>
              <input type="text" id="phone" data-th-field="*{phoneNumber}" required placeholder="+91 9876543210" class="w-full pl-11 pr-4 py-3 bg-gray-50 dark:bg-gray-950 border border-gray-200 dark:border-gray-800 rounded-xl text-gray-900 dark:text-white focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all placeholder-gray-400" />
            </div>
            <p data-th-if="${#fields.hasErrors('phoneNumber')}" data-th-errors="*{phoneNumber}" class="text-red-500 text-xs font-semibold mt-1.5 ml-1"></p>
          </div>
        </div>

        <div>
          <label for="email" class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Email Address</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
              <i class="fa-regular fa-envelope"></i>
            </div>
            <input type="email" id="email" data-th-field="*{email}" required placeholder="name@company.com" class="w-full pl-11 pr-4 py-3 bg-gray-50 dark:bg-gray-950 border border-gray-200 dark:border-gray-800 rounded-xl text-gray-900 dark:text-white focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all placeholder-gray-400" />
          </div>
          <p data-th-if="${#fields.hasErrors('email')}" data-th-errors="*{email}" class="text-red-500 text-xs font-semibold mt-1.5 ml-1"></p>
        </div>

        <div>
          <label for="password" class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">New Password</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
              <i class="fa-solid fa-lock text-sm"></i>
            </div>
            <input type="password" id="password" data-th-field="*{password}" required placeholder="••••••••" class="w-full pl-11 pr-4 py-3 bg-gray-50 dark:bg-gray-950 border border-gray-200 dark:border-gray-800 rounded-xl text-gray-900 dark:text-white focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all placeholder-gray-400" />
          </div>
          <p data-th-if="${#fields.hasErrors('password')}" data-th-errors="*{password}" class="text-red-500 text-xs font-semibold mt-1.5 ml-1"></p>
        </div>

        <div>
          <label for="about" class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Write Something About Yourself</label>
          <textarea id="about" rows="4" data-th-field="*{about}" placeholder="I am a software developer..." class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-950 border border-gray-200 dark:border-gray-800 rounded-xl text-gray-900 dark:text-white focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all placeholder-gray-400 resize-none"></textarea>
          <p data-th-if="${#fields.hasErrors('about')}" data-th-errors="*{about}" class="text-red-500 text-xs font-semibold mt-1.5 ml-1"></p>
        </div>

        <div class="flex flex-col sm:flex-row gap-3 pt-4">
          <button type="submit" class="w-full sm:w-2/3 py-3.5 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-lg shadow-blue-500/25 transition-all hover:-translate-y-0.5 flex items-center justify-center gap-2">
            <span>Sign Up</span>
            <i class="fa-solid fa-arrow-right"></i>
          </button>

          <button type="reset" class="w-full sm:w-1/3 py-3.5 bg-white dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-700 border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300 font-bold rounded-xl transition-all flex items-center justify-center gap-2">
            <i class="fa-solid fa-rotate-right"></i>
            <span>Reset</span>
          </button>
        </div>

      </form>

      <p class="text-center text-sm text-gray-500 mt-8">
        Already have an account?
        <a data-th-href="@{/login}" class="font-bold text-blue-600 dark:text-blue-400 hover:underline transition-all hover:text-blue-700">Log in here</a>
      </p>

    </div>
  </div>
</div>

<script>
  console.log("Modern SignUp Page Loaded Successfully");

  setTimeout(function() {
    let alertBox = document.getElementById("alert-container");
    if (alertBox) {
      alertBox.style.display = "none";
    }
  }, 3000);
</script>
</body>
</html>
