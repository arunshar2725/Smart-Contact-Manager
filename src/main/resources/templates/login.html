<!doctype html>
<html lang="en" th:replace="~{base::parent(~{::#content},~{::title},~{::script})}">
<head>
  <title>Login | SCM 2.0</title>
</head>
<body>
<div id="content">

  <div class="flex items-center justify-center bg-gray-50 dark:bg-gray-950 px-6 py-12 relative overflow-hidden">

    <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-blue-500/10 dark:bg-blue-600/10 blur-[120px] rounded-full pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[400px] h-[400px] bg-purple-500/10 dark:bg-purple-600/10 blur-[120px] rounded-full pointer-events-none"></div>

    <div class="max-w-lg w-full bg-white/80 dark:bg-gray-900/80 backdrop-blur-xl border border-gray-200 dark:border-gray-800 rounded-[2rem] p-8 md:p-10 shadow-2xl relative z-10">

      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-tr from-blue-600 to-blue-400  shadow-lg shadow-blue-500/30 mb-5">
          <i class="fa-solid fa-address-book text-3xl"></i>
        </div>
        <h2 class="text-3xl font-extrabold text-gray-900 dark:text-white tracking-tight">Welcome back</h2>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-2 font-medium">Log in to manage your contacts on the cloud.</p>
      </div>

      <div id="alert-container">
        <div data-th-replace="~{message::messagebox}"></div>

        <div data-th-if="${param.error}" class="flex items-center gap-3 p-4 mb-6 text-sm text-red-800 border border-red-200 rounded-xl bg-red-50 dark:bg-red-900/20 dark:text-red-400 dark:border-red-800/30 transition-all duration-500">
          <i class="fa-solid fa-circle-exclamation text-lg"></i>
          <span class="font-semibold">Invalid email or password.</span>
        </div>

        <div data-th-if="${param.logout}" class="flex items-center gap-3 p-4 mb-6 text-sm text-green-800 border border-green-200 rounded-xl bg-green-50 dark:bg-green-900/20 dark:text-green-400 dark:border-green-800/30 transition-all duration-500">
          <i class="fa-solid fa-circle-check text-lg"></i>
          <span class="font-semibold">You have been successfully logged out.</span>
        </div>
      </div>
      <div class="space-y-3">
        <a data-th-href="@{'/oauth2/authorization/google'}" class="flex items-center justify-center w-full px-4 py-3 bg-white dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-xl hover:bg-gray-50 dark:hover:bg-gray-800 transition-all shadow-sm hover:shadow group">
          <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5 mr-3 group-hover:scale-110 transition-transform" alt="Google icon" />
          <span class="text-sm font-bold text-gray-700 dark:text-gray-200">Continue with Google</span>
        </a>

        <a data-th-href="@{'/oauth2/authorization/github'}" class="flex items-center justify-center w-full px-4 py-3 bg-[#24292F] hover:bg-[#1b1f23] dark:bg-white dark:hover:bg-gray-100 text-white dark:text-gray-900 border border-transparent rounded-xl transition-all shadow-sm hover:shadow group">
          <i class="fa-brands fa-github text-xl mr-3 group-hover:scale-110 transition-transform"></i>
          <span class="text-sm font-bold">Continue with GitHub</span>
        </a>
      </div>

      <div class="flex items-center my-6">
        <div class="flex-grow border-t border-gray-200 dark:border-gray-800"></div>
        <span class="px-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">Or with email</span>
        <div class="flex-grow border-t border-gray-200 dark:border-gray-800"></div>
      </div>

      <form method="post" data-th-action="@{'/authenticate'}" class="space-y-5">

        <div>
          <label for="email" class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Email Address</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
              <i class="fa-regular fa-envelope"></i>
            </div>
            <input name="email" type="email" id="email" required placeholder="name@company.com" class="w-full pl-11 pr-4 py-3.5 bg-gray-50 dark:bg-gray-950 border border-gray-200 dark:border-gray-800 rounded-xl text-gray-900 dark:text-white focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all placeholder-gray-400" />
          </div>
        </div>

        <div>

          <div class="relative">
            <label for="email" class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Email Address</label>

            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
              <i class="fa-solid fa-lock text-sm"></i>
            </div>
            <input name="password" type="password" id="password" required placeholder="••••••••" class="w-full pl-11 pr-4 py-3.5 bg-gray-50 dark:bg-gray-950 border border-gray-200 dark:border-gray-800 rounded-xl text-gray-900 dark:text-white focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all placeholder-gray-400" />
          </div>
        </div>

        <div class="pt-2">
          <button type="submit" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-lg shadow-blue-500/25 transition-all hover:-translate-y-0.5 flex items-center justify-center gap-2">
            <span>Sign In to Account</span>
            <i class="fa-solid fa-arrow-right-to-bracket"></i>
          </button>
        </div>

      </form>

      <p class="text-center text-sm text-gray-500 mt-8">
        Don't have an account?
        <a data-th-href="@{/register}" class="font-bold text-blue-600 dark:text-blue-400 hover:underline transition-all hover:text-blue-700">Sign up here</a>
      </p>

    </div>
  </div>
</div>

<script>
  // 3000 ka matlab 3 seconds hai. Aap chaho toh isko 4000 (4 sec) bhi kar sakte ho.
  setTimeout(function() {
    let alertBox = document.getElementById("alert-container");
    if (alertBox) {
      alertBox.style.display = "none";
    }
  }, 3000);
</script>
</body>
</html>
