<!doctype html>
<html
  lang="en"
  th:replace="~{base :: parent(~{::#content},~{::title},~{::script})}"
>
  <head>
    <title>Update Contact</title>
  </head>
  <body>
    <div id="content">
      <!-- sidebar -->

      <!-- user is logged in : sidebar -->

      <div th:if="${loggedInUser}">
        <div data-th-replace="~{user/sidebar :: sidebar}"></div>
      </div>

      <div class="flex flex-col min-h-screen bg-gray-50 dark:bg-gray-900">
        <div class="grid grid-cols-12 flex-grow">
          <!-- Sidebar Space -->
          <div class="hidden md:block md:col-span-3"></div>

          <!-- Main Content -->
          <div
            class="col-span-12 md:col-span-9 lg:col-span-8 xl:col-span-7 p-4 md:p-8"
          >
            <div
              class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-3xl shadow-2xl overflow-hidden"
            >
              <!-- Header -->
              <div
                class="bg-gradient-to-r from-blue-600 to-indigo-700 px-8 py-6 text-white"
              >
                <h1
                  class="text-3xl dark:text-white font-bold text-slate-900 flex items-center gap-3"
                >
                  <i class="fa-solid fa-user-pen"></i>
                  Update Contact
                </h1>

                <p class="dark:text-gray-200 text-gray-900 mt-2 text-sm">
                  Update and manage your contact information easily.
                </p>
              </div>

              <!-- Message -->
              <div class="px-8 pt-6">
                <div data-th-replace="~{message::messagebox}"></div>
              </div>

              <!-- Form -->
              <form
                class="px-8 py-3 space-y-6"
                data-th-action="@{'/user/contacts/update/' + ${id}}"
                data-th-object="${contactForm}"
                method="post"
                enctype="multipart/form-data"
              >
                <!-- Name -->
                <div>
                  <label
                    class="block mb-2 text-sm font-semibold text-gray-700 dark:text-gray-200"
                  >
                    Contact Name
                  </label>

                  <div class="relative">
                    <div
                      class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-gray-400"
                    >
                      <i class="fa-regular fa-user"></i>
                    </div>

                    <input
                      data-th-field="*{name}"
                      type="text"
                      placeholder="Enter contact name"
                      class="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-gray-700 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"
                    />
                  </div>

                  <p
                    class="text-red-500 text-sm mt-2"
                    data-th-if="${#fields.hasErrors('name')}"
                    data-th-errors="*{name}"
                  ></p>
                </div>

                <!-- Email -->
                <div>
                  <label
                    class="block mb-2 text-sm font-semibold text-gray-700 dark:text-gray-200"
                  >
                    Contact Email
                  </label>

                  <div class="relative">
                    <div
                      class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-gray-400"
                    >
                      <i class="fa-regular fa-envelope"></i>
                    </div>

                    <input
                      type="email"
                      data-th-field="*{email}"
                      placeholder="example@gmail.com"
                      class="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-gray-700 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"
                    />
                  </div>

                  <p
                    class="text-red-500 text-sm mt-2"
                    data-th-if="${#fields.hasErrors('email')}"
                    data-th-errors="*{email}"
                  ></p>
                </div>

                <!-- Phone -->
                <div>
                  <label
                    class="block mb-2 text-sm font-semibold text-gray-700 dark:text-gray-200"
                  >
                    Contact Phone
                  </label>

                  <div class="relative">
                    <div
                      class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-gray-400"
                    >
                      <i class="fa-solid fa-phone"></i>
                    </div>

                    <input
                      data-th-field="*{phoneNumber}"
                      type="text"
                      placeholder="Phone Number"
                      class="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-gray-700 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"
                    />
                  </div>

                  <p
                    class="text-red-500 text-sm mt-2"
                    data-th-if="${#fields.hasErrors('phoneNumber')}"
                    data-th-errors="*{phoneNumber}"
                  ></p>
                </div>

                <!-- Address -->
                <div>
                  <label
                    class="block mb-2 text-sm font-semibold text-gray-700 dark:text-gray-200"
                  >
                    Contact Address
                  </label>

                  <textarea
                    data-th-field="*{address}"
                    rows="4"
                    placeholder="Enter address"
                    class="w-full rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-gray-700 dark:text-white p-4 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"
                  ></textarea>

                  <p
                    class="text-red-500 text-sm mt-2"
                    data-th-if="${#fields.hasErrors('address')}"
                    data-th-errors="*{address}"
                  ></p>
                </div>

                <!-- Description -->
                <div>
                  <label
                    class="block mb-2 text-sm font-semibold text-gray-700 dark:text-gray-200"
                  >
                    Description
                  </label>

                  <textarea
                    data-th-field="*{description}"
                    rows="4"
                    placeholder="Write something about this contact"
                    class="w-full rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-gray-700 dark:text-white p-4 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"
                  ></textarea>
                </div>

                <!-- Social Links -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <!-- Website -->
                  <div>
                    <label
                      class="block mb-2 text-sm font-semibold text-gray-700 dark:text-gray-200"
                    >
                      Website Link
                    </label>

                    <div class="relative">
                      <div
                        class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-gray-400"
                      >
                        <i class="fa-solid fa-earth-americas"></i>
                      </div>

                      <input
                        data-th-field="*{websiteLink}"
                        placeholder="https://yourwebsite.com"
                        class="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-gray-700 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"
                      />
                    </div>
                  </div>

                  <!-- LinkedIn -->
                  <div>
                    <label
                      class="block mb-2 text-sm font-semibold text-gray-700 dark:text-gray-200"
                    >
                      LinkedIn Link
                    </label>

                    <div class="relative">
                      <div
                        class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-gray-400"
                      >
                        <i class="fa-brands fa-linkedin"></i>
                      </div>

                      <input
                        type="text"
                        data-th-field="*{linkedInLink}"
                        placeholder="https://linkedin.com/in/username"
                        class="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-gray-700 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"
                      />
                    </div>
                  </div>
                </div>

                <!-- Image Upload -->
                <div>
                  <label
                    class="block mb-3 text-sm font-semibold text-gray-700 dark:text-gray-200"
                  >
                    Contact Image
                  </label>

                  <input
                    id="image_file_input"
                    data-th-field="*{contactImage}"
                    type="file"
                    accept="image/png, image/jpeg, image/jpg"
                    class="block w-full text-sm text-gray-700 dark:text-gray-300 border border-gray-300 dark:border-gray-600 rounded-xl cursor-pointer bg-gray-50 dark:bg-gray-700 focus:outline-none"
                  />

                  <p
                    class="text-red-500 text-sm mt-2"
                    data-th-if="${#fields.hasErrors('contactImage')}"
                    data-th-errors="*{contactImage}"
                  ></p>

                  <img
                    data-th-src="*{picture} ?: 'https://imgs.search.brave.com/jHDp_R14w-tbRDiYsyiOCGDeCSPE4WqsVfFwiXVDyow/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly90NC5m/dGNkbi5uZXQvanBn/LzExLzY4LzUwLzU3/LzM2MF9GXzExNjg1/MDU3OTRfSUJDRWlh/ZnNJckhGSjA5ZTY1/UDJ2aDUxMTVDMVhJ/N2UuanBn'"
                    id="upload_image_preview"
                    class="w-40 h-40 object-cover rounded-2xl shadow-lg mx-auto mt-6 border-4 border-white dark:border-gray-700"
                    src=""
                    alt="Preview"
                  />
                </div>

                <!-- Favourite -->
                <div
                  class="flex items-center gap-3 bg-gray-100 dark:bg-gray-700 rounded-xl p-4"
                >
                  <input
                    data-th-field="*{favourite}"
                    type="checkbox"
                    class="w-5 h-5 text-blue-600 rounded focus:ring-blue-500"
                  />

                  <label
                    class="text-sm font-medium text-gray-700 dark:text-gray-200"
                  >
                    Mark this contact as favourite
                  </label>
                </div>

                <!-- Buttons -->
                <div class="flex flex-col sm:flex-row gap-4 pt-4">
                  <button
                    id="update-btn"
                    type="submit"
                    disabled
                    class="flex-1 py-3 rounded-xl bg-gradient-to-r from-blue-600 to-indigo-700 hover:from-blue-700 hover:to-indigo-800 text-white font-semibold shadow-lg transition duration-300 disabled:opacity-50 disabled:cursor-not-allowed"
                  >
                    <i class="fa-solid fa-floppy-disk mr-2"></i>
                    Update Contact
                  </button>

                  <button
                    type="reset"
                    class="flex-1 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-700 dark:text-white hover:bg-gray-100 dark:hover:bg-gray-600 transition duration-300"
                  >
                    <i class="fa-solid fa-rotate-left mr-2"></i>
                    Reset
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script data-th-src="@{'/js/update.js'}"></script>
    <script>
      console.log("this is profile page");
    </script>
  </body>
</html>
