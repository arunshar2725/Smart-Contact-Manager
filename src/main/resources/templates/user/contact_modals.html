<div data-th-fragment="contact">
  <div
    id="view_contact_modal"
    tabindex="-1"
    aria-hidden="true"
    class="hidden overflow-y-auto overflow-x-hidden fixed top-0 right-0 left-0 z-50 justify-center items-center w-full md:inset-0 h-[calc(100%-1rem)] max-h-full"
  >
    <div class="relative p-4 w-full max-w-md max-h-full">
      <div
        class="relative bg-white rounded-2xl shadow-2xl dark:bg-gray-800 border dark:border-gray-700"
      >
        <div
          class="flex items-center justify-between p-4 md:p-5 border-b rounded-t dark:border-gray-700 border-gray-200"
        >
          <h3 class="text-xl font-bold text-gray-900 dark:text-white">
            Contact Profile
          </h3>
          <button
            type="button"
            class="text-gray-400 bg-transparent hover:bg-gray-200 hover:text-gray-900 rounded-lg text-sm w-8 h-8 ms-auto inline-flex justify-center items-center dark:hover:bg-gray-600 dark:hover:text-white"
            onclick="closeContactModal()"
          >
            <svg
              class="w-3 h-3"
              aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 14 14"
            >
              <path
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"
              />
            </svg>
            <span class="sr-only">Close modal</span>
          </button>
        </div>

        <div class="p-5 md:p-6 text-center">
          <img
            id="contact_picture"
            class="w-32 h-32 mx-auto mb-4 rounded-full shadow-md object-cover border-4 border-gray-100 dark:border-gray-600"
            src=""
            alt="Profile Picture"
          />

          <h5
            id="contact_name"
            class="mb-1 text-2xl font-bold text-gray-900 dark:text-white"
          ></h5>
          <p
            id="contact_email"
            class="text-sm text-gray-500 dark:text-gray-400 break-all"
          ></p>

          <div id="contact_favourite" class="mt-3"></div>

          <div class="flex justify-center mt-4 space-x-5">
            <a
              id="contact_website"
              href="#"
              target="_blank"
              class="hidden text-gray-500 hover:text-blue-600 dark:hover:text-blue-400 transition-colors"
            >
              <i class="fa-solid fa-globe text-2xl"></i>
            </a>
            <a
              id="contact_linkedin"
              href="#"
              target="_blank"
              class="hidden text-gray-500 hover:text-blue-600 dark:hover:text-blue-400 transition-colors"
            >
              <i class="fa-brands fa-linkedin text-2xl"></i>
            </a>
          </div>

          <div class="mt-6 flex flex-col space-y-3 text-left w-full">
            <div
              class="w-full flex items-center p-3 bg-gray-50 dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-700"
            >
              <div
                class="flex-shrink-0 w-10 h-10 flex items-center justify-center bg-blue-100 dark:bg-blue-900 text-blue-600 dark:text-blue-400 rounded-lg"
              >
                <i class="fa-solid fa-phone"></i>
              </div>
              <div class="ml-4 w-full">
                <p
                  class="text-[11px] font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider"
                >
                  Phone Number
                </p>
                <p
                  id="contact_phone"
                  class="text-gray-800 dark:text-gray-200 font-medium"
                ></p>
              </div>
            </div>

            <div
              class="w-full flex items-center p-3 bg-gray-50 dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-700"
            >
              <div
                class="flex-shrink-0 w-10 h-10 flex items-center justify-center bg-red-100 dark:bg-red-900 text-red-500 rounded-lg"
              >
                <i class="fa-solid fa-location-dot"></i>
              </div>
              <div class="ml-4 w-full">
                <p
                  class="text-[11px] font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider"
                >
                  Address
                </p>
                <p
                  id="contact_address"
                  class="text-gray-800 dark:text-gray-200 font-medium leading-tight"
                ></p>
              </div>
            </div>

            <div
              class="w-full flex items-start p-3 bg-gray-50 dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-700"
            >
              <div
                class="flex-shrink-0 w-10 h-10 flex items-center justify-center bg-gray-200 dark:bg-gray-800 text-gray-600 dark:text-gray-400 rounded-lg mt-0.5"
              >
                <i class="fa-solid fa-circle-info"></i>
              </div>
              <div class="ml-4 w-full">
                <p
                  class="text-[11px] font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider"
                >
                  Description
                </p>
                <p
                  id="contact_about"
                  class="text-gray-800 dark:text-gray-200 text-sm leading-snug"
                ></p>
              </div>
            </div>
          </div>
        </div>

        <div
          class="flex justify-center p-4 md:p-5 border-t border-gray-200 rounded-b dark:border-gray-700 bg-gray-50 dark:bg-gray-800"
        >
          <button
            onclick="closeContactModal()"
            type="button"
            class="w-full p-4 md:w-auto text-white bg-gray-800 hover:bg-gray-900 focus:ring-4 focus:outline-none focus:ring-gray-300 font-medium rounded-lg text-sm px-10 py-2.5 text-center dark:bg-gray-600 dark:hover:bg-gray-700 dark:focus:ring-gray-800 transition-colors"
          >
            Close
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
