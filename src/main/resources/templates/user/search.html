<!doctype html>
<html
  lang="en"
  th:replace="~{base::parent(~{::#content},~{::title},~{::script})}"
>
  <head>
    <title>Search Contact</title>
  </head>
  <body>
    <div id="content">
      <!-- if user islogged in  - sidebar -->
      <div data-th-if="${loggedInUser}">
        <div data-th-replace="~{user/sidebar::sidebar}"></div>
      </div>

      <div class="flex flex-col">
        <h1 class="text-5xl font-semibold">Search Result</h1>
        <p class="mt-2 text-xl text-gray-600 dark:text-gray-400">
          Lorem ipsum dolor sit amet consectetur, adipisicing elit. Atque qua
        </p>
      </div>
      <div class="contact_container px-4 py-1">
        <div class="relative overflow-x-auto shadow-md sm:rounded-lg">
          <form action="" data-th-action="@{'/user/contacts/search'}">
            <div
              class="flex items-end justify-between px-4 py-2 flex-column flex-wrap md:flex-row space-y-4 md:space-y-0 bg-white dark:bg-gray-900"
            >
              <!-- select box -->
              <div>
                <select
                  name="field"
                  id="countries"
                  class="mb-3 bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
                >
                  <option class="dark:bg-gray-500 bg-gray-300">
                    Select Field
                  </option>
                  <option value="name">Name</option>
                  <option value="phone">Phone</option>
                  <option value="email">Email</option>
                </select>
              </div>
              <!-- FIX: outer wrapper added for spacing -->
              <div id="message-box" class="ml-3 -translate-y-2.5">
                <div data-th-replace="~{message::messagebox}"></div>
              </div>

              <label for="table-search" class="sr-only">Search</label>
              <div class="relative ml-auto">
                <div
                  class="absolute px-4 inset-y-0 rtl:inset-r-0 start-0 flex items-center ps-3 pointer-events-none"
                >
                  <svg
                    class="w-4 h-4 mt-5 text-gray-500 dark:text-gray-400"
                    aria-hidden="true"
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 20 20"
                  >
                    <path
                      stroke="currentColor"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="m19 19-4-4m0-7A7 7 0 1 1 1 8a7 7 0 0 1 14 0Z"
                    />
                  </svg>
                </div>
                <input
                  name="keyword"
                  type="text"
                  id="table-search-users"
                  class="block mt-8 mb-3 p-2 ps-10 text-sm text-gray-900 border border-gray-300 rounded-lg w-40 bg-gray-50 focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
                  placeholder="Search for users"
                />
              </div>
              <button
                type="submit"
                class="px-3 py-2 rounded-lg ml-2 -translate-y-2.5 bg-gray-400 text-white dark:bg-"
              >
                Search
              </button>
            </div>
          </form>

          <table
            class="w-full text-sm text-left rtl:text-right text-gray-500 dark:text-gray-400"
          >
            <thead
              class="text-xs text-gray-700 uppercase bg-gray-100 dark:bg-gray-700 dark:text-gray-400"
            >
              <tr>
                <th scope="col" class="px-6 py-3">Name</th>
                <th scope="col" class="px-6 py-3">Phone</th>
                <th scope="col" class="px-6 py-3">Links</th>
                <th scope="col" class="px-6 py-3">Action</th>
              </tr>
            </thead>
            <tbody>
              <tr
                data-th-object="${c}"
                data-th-each="c :${pageContact.content}"
                class="bg-white border-b dark:bg-gray-800 dark:border-gray-700 border-gray-200 hover:bg-gray-50 dark:hover:bg-gray-600"
              >
                <th
                  scope="row"
                  class="flex items-center px-6 py-4 text-gray-900 whitespace-nowrap dark:text-white"
                >
                  <img
                    class="w-10 h-10 rounded-full"
                    onerror="
                      this.src =
                        'https://imgs.search.brave.com/jHDp_R14w-tbRDiYsyiOCGDeCSPE4WqsVfFwiXVDyow/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly90NC5m/dGNkbi5uZXQvanBn/LzExLzY4LzUwLzU3/LzM2MF9GXzExNjg1/MDU3OTRfSUJDRWlh/ZnNJckhGSjA5ZTY1/UDJ2aDUxMTVDMVhJ/N2UuanBn'
                    "
                    data-th-src="@{*{picture}}"
                    src="/images/people/profile-picture-1.jpg"
                    alt="Jese image"
                  />
                  <div class="ps-3">
                    <div class="text-base font-semibold" data-th-text="*{name}">
                      Neil Sims
                    </div>
                    <div
                      class="font-normal text-gray-500"
                      data-th-text="*{email}"
                    ></div>
                  </div>
                </th>
                <td class="px-6 py-4">
                  <i class="fa-solid fa-phone w-4 h-4"></i>
                  <span data-th-text="*{phoneNumber}"></span>
                </td>
                <td class="px-6 py-4">
                  <div class="flex items-center space-x-2">
                    <!-- Favourite = TRUE → filled star → click to UNFAVOURITE -->
                    <div data-th-if="${c.favourite}">
                      <a
                        data-th-href="@{/user/contacts/favourite(id=${c.id},favourite=false,page=${pageContact.number},size=${pageContact.size})}"
                      >
                        <i
                          class="fa-solid fa-star text-yellow-400 cursor-pointer hover:text-gray-400 transition-colors"
                        ></i>
                      </a>
                    </div>

                    <!-- Favourite = FALSE → empty star → click to FAVOURITE -->
                    <div data-th-unless="${c.favourite}">
                      <a
                        data-th-href="@{/user/contacts/favourite(id=${c.id},favourite=true,page=${pageContact.number},size=${pageContact.size})}"
                      >
                        <i
                          class="fa-regular fa-star text-gray-400 cursor-pointer hover:text-yellow-400 transition-colors"
                        ></i>
                      </a>
                    </div>

                    <a data-th-href="@{*{websiteLink}}" target="_blank"
                      ><i class="fa-solid fa-link pr-5"></i
                    ></a>

                    <a data-th-href="@{*{linkedinLink}}" target="_blank"
                      ><i class="fa-brands fa-linkedin"></i
                    ></a>
                  </div>
                </td>
                <td class="px-6 py-4">
                  <div class="gap-3 flex items-center">
                    <a href="">
                      <i class="fa-solid fa-trash"></i>
                    </a>
                    <a href="">
                      <i class="fa-solid fa-pen"></i>
                    </a>
                    <a href="">
                      <i class="fa-solid fa-eye"></i>
                    </a>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
          <!-- pagination component -->

          <div
            th:if="${pageContact.totalPages > 0}"
            class="pagination_container p-5 flex justify-center"
          >
            <nav aria-label="Page navigation example">
              <ul class="flex items-center -space-x-px h-10 text-base">
                <li data-th-unless="${pageContact.first}">
                  <a
                    th:href="@{'/user/contacts?page=' + ${pageContact.number - 1} + '&size=' + ${pageContact.size}}"
                    class="flex items-center justify-center px-4 h-10 ms-0 leading-tight text-gray-500 bg-white border border-e-0 border-gray-300 rounded-s-lg hover:bg-gray-100 hover:text-gray-700 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-400 dark:hover:bg-gray-700 dark:hover:text-white"
                    >Previous</a
                  >
                </li>
                <li
                  data-th-each="index : ${#numbers.sequence(0, pageContact.totalPages-1)}"
                >
                  <a
                    data-th-href="@{'/user/contacts?size=' + ${pageSize} + '&page=' + ${index}}"
                    href="#"
                    class="flex items-center justify-center px-4 h-10 border border-gray-300 hover:bg-blue-100"
                    th:classappend="${index == pageContact.number}?'bg-blue-gray text-gray-700 dark:text-white dark:bg-gray-400 ': ' bg-white text-gray-500 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-400 dark:hover:bg-gray-700 dark:hover:text-white'"
                  >
                    <span data-th-text="${index+1}"></span
                  ></a>
                </li>

                <li data-th-unless="${pageContact.last}">
                  <a
                    th:href="@{'/user/contacts?page=' + ${pageContact.number + 1} + '&size=' + ${pageContact.size}}"
                    href="#"
                    class="flex items-center justify-center px-4 h-10 leading-tight text-gray-500 bg-white border border-gray-300 rounded-e-lg hover:bg-gray-100 hover:text-gray-700 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-400 dark:hover:bg-gray-700 dark:hover:text-white"
                  >
                    Next
                  </a>
                </li>
              </ul>
            </nav>
          </div>
        </div>
      </div>
    </div>

    <script>
      console.log("This is Profile page");
    </script>
  </body>
</html>
