<!doctype html>
<html
  lang="en"
  th:replace="~{base :: parent(~{::#content},~{::title},~{::script})}"
>
  <head>
    <title>Add Contact</title>
  </head>

  <body>
    <div id="content">
      <!-- Sidebar -->
      <div th:if="${loggedInUser}">
        <div data-th-replace="~{user/sidebar :: sidebar}"></div>
      </div>

      <!-- Main Layout -->
      <div class="min-h-screen bg-gray-50 dark:bg-gray-900 py-4 px-3 md:px-6">
        <div class="grid grid-cols-12">
          <!-- Sidebar Space -->
          <div class="hidden md:block md:col-span-3"></div>

          <!-- Main Content -->
          <div class="col-span-12 md:col-span-9 lg:col-span-7 xl:col-span-6">
            <div
              class="relative overflow-hidden bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-3xl shadow-2xl"
            >
              <!-- Top Gradient -->
              <div
                class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-500 via-indigo-500 to-purple-600"
              ></div>

              <div class="p-8 md:p-10">
                <!-- Message -->
                <div class="mb-6">
                  <div data-th-replace="~{message::messagebox}"></div>
                </div>

                <!-- Header -->
                <div class="mb-10 text-center">
                  <div
                    class="w-20 h-20 mx-auto rounded-2xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow-lg mb-5"
                  >
                    <i class="fa-solid fa-user-plus text-3xl"></i>
                  </div>

                  <h1
                    class="text-4xl font-bold text-gray-800 dark:text-white tracking-tight"
                  >
                    Add New Contact
                  </h1>

                  <p
                    class="mt-3 text-gray-500 dark:text-gray-400 max-w-xl mx-auto leading-relaxed"
                  >
                    Save and manage your important contacts securely in Smart
                    Contact Manager.
                  </p>
                </div>

                <!-- Form -->
                <form
                  class="space-y-6"
                  data-th-action="@{'/user/contacts/add'}"
                  data-th-object="${contactForm}"
                  method="post"
                  enctype="multipart/form-data"
                >
                  <div class="mb-4">
                    <label
                      for="category"
                      class="block text-sm font-semibold text-gray-900 dark:text-gray-300 mb-2"
                    >
                      Tag / Category
                    </label>
                    <select
                      id="category"
                      name="category"
                      data-th-field="*{category}"
                      class="w-full px-4 py-3 rounded-xl bg-gray-50 dark:bg-[#09090b] border border-gray-200 dark:border-white/10 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all cursor-pointer"
                    >
                      <option value="General">📁 General</option>
                      <option value="Work">💼 Work</option>
                      <option value="Family">🏠 Family</option>
                      <option value="Friend">🤝 Friend</option>
                      <option value="VIP">⭐ VIP</option>
                    </select>
                  </div>
                  <!-- Name -->
                  <div>
                    <label
                      class="block mb-2 text-sm font-semibold text-gray-700 dark:text-gray-200"
                    >
                      Contact Name
                    </label>

                    <div class="relative">
                      <div
                        class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-gray-400"
                      >
                        <i class="fa-regular fa-user"></i>
                      </div>

                      <input
                        data-th-field="*{name}"
                        type="text"
                        placeholder="Enter contact name"
                        class="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-gray-700 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200"
                      />
                    </div>

                    <p
                      class="text-red-500 text-sm mt-2"
                      data-th-if="${#fields.hasErrors('name')}"
                      data-th-errors="*{name}"
                    ></p>
                  </div>

                  <!-- Email -->
                  <div>
                    <label
                      class="block mb-2 text-sm font-semibold text-gray-700 dark:text-gray-200"
                    >
                      Contact Email
                    </label>

                    <div class="relative">
                      <div
                        class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-gray-400"
                      >
                        <i class="fa-regular fa-envelope"></i>
                      </div>

                      <input
                        type="email"
                        data-th-field="*{email}"
                        placeholder="example@gmail.com"
                        class="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-gray-700 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200"
                      />
                    </div>

                    <p
                      class="text-red-500 text-sm mt-2"
                      data-th-if="${#fields.hasErrors('email')}"
                      data-th-errors="*{email}"
                    ></p>
                  </div>

                  <!-- Phone -->
                  <div>
                    <label
                      class="block mb-2 text-sm font-semibold text-gray-700 dark:text-gray-200"
                    >
                      Contact Phone
                    </label>

                    <div class="relative">
                      <div
                        class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-gray-400"
                      >
                        <i class="fa-solid fa-phone"></i>
                      </div>

                      <input
                        data-th-field="*{phoneNumber}"
                        type="text"
                        placeholder="Phone Number"
                        class="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-gray-700 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200"
                      />
                    </div>

                    <p
                      class="text-red-500 text-sm mt-2"
                      data-th-if="${#fields.hasErrors('phoneNumber')}"
                      data-th-errors="*{phoneNumber}"
                    ></p>
                  </div>

                  <!-- Address -->
                  <div>
                    <label
                      class="block mb-2 text-sm font-semibold text-gray-700 dark:text-gray-200"
                    >
                      Contact Address
                    </label>

                    <textarea
                      data-th-field="*{address}"
                      rows="4"
                      placeholder="Enter address"
                      class="w-full rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-gray-700 dark:text-white p-4 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200"
                    ></textarea>

                    <p
                      class="text-red-500 text-sm mt-2"
                      data-th-if="${#fields.hasErrors('address')}"
                      data-th-errors="*{address}"
                    ></p>
                  </div>

                  <!-- Description -->
                  <div>
                    <label
                      class="block mb-2 text-sm font-semibold text-gray-700 dark:text-gray-200"
                    >
                      Contact Description
                    </label>

                    <textarea
                      data-th-field="*{description}"
                      rows="4"
                      placeholder="Write something about this contact"
                      class="w-full rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-gray-700 dark:text-white p-4 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200"
                    ></textarea>
                  </div>

                  <!-- Social Links -->
                  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Website -->
                    <div>
                      <label
                        class="block mb-2 text-sm font-semibold text-gray-700 dark:text-gray-200"
                      >
                        Website Link
                      </label>

                      <div class="relative">
                        <div
                          class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-gray-400"
                        >
                          <i class="fa-solid fa-earth-americas"></i>
                        </div>

                        <input
                          data-th-field="*{websiteLink}"
                          placeholder="https://yourwebsite.com"
                          class="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-gray-700 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200"
                        />
                      </div>
                    </div>

                    <!-- LinkedIn -->
                    <div>
                      <label
                        class="block mb-2 text-sm font-semibold text-gray-700 dark:text-gray-200"
                      >
                        LinkedIn Link
                      </label>

                      <div class="relative">
                        <div
                          class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-gray-400"
                        >
                          <i class="fa-brands fa-linkedin"></i>
                        </div>

                        <input
                          type="text"
                          data-th-field="*{linkedInLink}"
                          placeholder="https://linkedin.com/in/username"
                          class="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-gray-700 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200"
                        />
                      </div>
                    </div>
                  </div>

                  <!-- Image Upload -->
                  <div>
                    <label
                      class="block mb-3 text-sm font-semibold text-gray-700 dark:text-gray-200"
                    >
                      Contact Image
                    </label>

                    <input
                      id="image_file_input"
                      data-th-field="*{contactImage}"
                      type="file"
                      accept="image/png, image/jpeg, image/jpg"
                      class="block w-full text-sm text-gray-700 dark:text-gray-300 border border-gray-300 dark:border-gray-600 rounded-xl cursor-pointer bg-gray-50 dark:bg-gray-700 focus:outline-none p-2"
                    />

                    <p
                      class="text-red-500 text-sm mt-2"
                      data-th-if="${#fields.hasErrors('contactImage')}"
                      data-th-errors="*{contactImage}"
                    ></p>

                    <img
                      class="hidden h-40 w-40 object-cover mx-auto rounded-2xl shadow-xl mt-6 border-4 border-white dark:border-gray-700"
                      id="upload_image_preview"
                      alt="Preview"
                    />
                  </div>

                  <!-- Favourite -->
                  <div
                    class="flex items-center gap-3 bg-gray-100 dark:bg-gray-700 rounded-xl p-4"
                  >
                    <input
                      data-th-field="*{favourite}"
                      type="checkbox"
                      class="w-5 h-5 text-blue-600 rounded focus:ring-blue-500"
                    />

                    <label
                      class="text-sm font-medium text-gray-700 dark:text-gray-200"
                    >
                      Mark this contact as favourite
                    </label>
                  </div>

                  <!-- Buttons -->
                  <div class="flex flex-col sm:flex-row gap-4 pt-4">
                    <button
                      type="submit"
                      class="flex-1 py-3 rounded-2xl bg-gradient-to-r from-blue-600 to-indigo-700 hover:from-blue-700 hover:to-indigo-800 bg-gray-100 dark:bg-gray-700 font-semibold shadow-lg transition-all duration-300 hover:scale-[1.01]"
                    >
                      <i class="fa-solid fa-plus mr-2"></i>
                      Add Contact
                    </button>

                    <button
                      type="reset"
                      class="flex-1 py-3 rounded-2xl border border-gray-300 dark:border-gray-600 bg-gray-100 dark:bg-gray-700 dark:text-white hover:bg-gray-100 dark:hover:bg-gray-600 transition-all duration-300"
                    >
                      <i class="fa-solid fa-rotate-left mr-2"></i>
                      Reset
                    </button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Image Preview -->
    <script>
      const imageInput = document.getElementById("image_file_input");

      const imagePreview = document.getElementById("upload_image_preview");

      imageInput.addEventListener("change", function (event) {
        const file = event.target.files[0];

        if (file) {
          const imageURL = URL.createObjectURL(file);

          imagePreview.src = imageURL;

          imagePreview.classList.remove("hidden");
        } else {
          imagePreview.classList.add("hidden");
        }
      });
    </script>

    <script data-th-src="@{'/js/admin.js'}"></script>

    <script>
      console.log("This is Add Contact Page");
    </script>
  </body>
</html>
