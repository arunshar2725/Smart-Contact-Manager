<!doctype html>
<html
  lang="en"
  th:replace="~{base::parent(~{::#content},~{::title},~{::script})}"
>
  <head>
    <title>All your Contacts</title>
  </head>

  <body>
    <div id="content">
      <!-- Sidebar -->
      <div data-th-if="${loggedInUser}">
        <div data-th-replace="~{user/sidebar::sidebar}"></div>
      </div>

      <!-- Main Wrapper -->
      <div
        class="min-h-screen bg-gray-50 dark:bg-gray-900 px-2 sm:px-4 md:px-6 py-5"
      >
        <!-- Page Header -->
        <div class="text-center mb-13">
          <h1
            class="text-3xl mb-3 sm:text-4xl md:text-5xl font-bold leading-tight text-gray-900 dark:text-white"
            data-th-text="${customHeading != null ? customHeading : 'Welcome to All Contacts Page'}"
          >
            Welcome to All Contacts Page
          </h1>

          <p class="mt-3 text-lg sm:text-xl text-gray-600 dark:text-gray-400">
            List of All Contacts
          </p>
        </div>

        <!-- Main Card -->
        <div
          class="max-w-7xl mx-auto bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-3xl shadow-2xl overflow-hidden"
        >
          <!-- Top Controls -->
          <form
            data-th-object="${contactSearchForm}"
            data-th-action="@{'/user/contacts/search'}"
          >
            <div
              class="flex flex-col xl:flex-row xl:items-end xl:justify-between gap-5 px-5 pt-4 pb-2 bg-white dark:bg-gray-800"
            >
              <!-- Left Controls -->
              <div class="flex flex-col sm:flex-row gap-4 w-full xl:w-auto">
                <!-- Select -->
                <div class="w-full sm:w-52">
                  <select
                    id="countries"
                    data-th-field="*{field}"
                    name="field"
                    class="w-full h-14 px-4 bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-2xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white transition-all duration-200"
                  >
                    <option selected value="">Select Field</option>
                    <option value="name">Name</option>
                    <option value="phone">Phone</option>
                    <option value="email">Email</option>
                  </select>
                </div>

                <!-- Search -->
                <div class="flex gap-3 w-full">
                  <div class="relative flex-1">
                    <div
                      class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none"
                    >
                      <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
                    </div>

                    <input
                      id="table-search-users"
                      data-th-field="*{value}"
                      type="text"
                      placeholder="Search for users"
                      class="w-full h-14 pl-12 pr-4 text-sm border border-gray-300 rounded-2xl bg-gray-50 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white transition-all duration-200"
                    />
                  </div>

                  <!-- Search Button -->
                  <button
                    id="search-btn"
                    type="button"
                    class="h-14 px-7 rounded-2xl bg-gray-400 cursor-not-allowed text-white font-semibold shadow-lg transition-all duration-200"
                  >
                    Search
                  </button>
                </div>
              </div>

              <!-- Right Controls -->
              <div
                th:if="${pageContact.totalElements > 0}"
                class="flex flex-col sm:flex-row gap-3 xl:justify-end"
              >
                <!-- Excel -->
                <a
                  data-th-href="@{/user/contacts/export/excel}"
                  class="px-5 py-3 bg-green-600 hover:bg-green-700 text-white rounded-xl text-sm font-medium text-center transition-all duration-200"
                >
                  <i class="fa-solid fa-file-excel mr-2"></i>
                  Export Excel
                </a>

                <!-- PDF -->
                <a
                  data-th-href="@{/user/contacts/export/pdf}"
                  class="px-5 py-3 bg-red-600 hover:bg-red-700 text-white rounded-xl text-sm font-medium text-center transition-all duration-200"
                >
                  <i class="fa-solid fa-file-pdf mr-2"></i>
                  Export PDF
                </a>
              </div>
            </div>
          </form>

          <!-- Message -->
          <div id="message-box" class="px-5 pb-2">
            <div data-th-replace="~{message::messagebox}"></div>
          </div>

          <!-- Custom Alert -->
          <div
            id="custom-alert"
            class="hidden fixed top-5 right-5 z-50 max-w-sm w-full"
          >
            <div
              class="bg-white dark:bg-gray-800 border border-red-200 dark:border-red-700 shadow-2xl rounded-2xl p-4 flex items-start gap-3"
            >
              <!-- Icon -->
              <div id="alert-icon" class="text-2xl">⚠️</div>

              <!-- Message -->
              <div class="flex-1">
                <p
                  id="alert-message"
                  class="text-sm font-medium text-gray-800 dark:text-white"
                >
                  Something went wrong
                </p>
              </div>

              <!-- Close -->
              <button
                onclick="closeAlert()"
                class="text-gray-400 hover:text-red-500 text-lg"
              >
                <i class="fa-solid fa-xmark"></i>
              </button>
            </div>
          </div>

          <!-- Table -->
          <div class="overflow-x-auto">
            <table
              class="w-full text-sm text-left text-gray-500 dark:text-gray-400"
            >
              <thead
                class="text-xs uppercase bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300"
              >
                <tr>
                  <th class="px-6 py-4">Name</th>
                  <th class="px-6 py-4">Phone</th>
                  <th class="px-6 py-4">Links</th>
                  <th class="px-6 py-4">Action</th>
                </tr>
              </thead>

              <tbody>
                <tr
                  data-th-each="c : ${pageContact.content}"
                  data-th-object="${c}"
                  class="bg-white border-b dark:bg-gray-800 dark:border-gray-700 hover:bg-blue-50 dark:hover:bg-gray-700 transition-all duration-200"
                >
                  <!-- Name -->
                  <th class="flex items-center px-6 py-4 whitespace-nowrap">
                    <img
                      class="w-12 h-12 rounded-full object-cover border"
                      onerror="
                        this.src =
                          'https://imgs.search.brave.com/jHDp_R14w-tbRDiYsyiOCGDeCSPE4WqsVfFwiXVDyow/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly90NC5m/dGNkbi5uZXQvanBn/LzExLzY4LzUwLzU3/LzM2MF9GXzExNjg1/MDU3OTRfSUJDRWlh/ZnNJckhGSjA5ZTY1/UDJ2aDUxMTVDMVhJ/N2UuanBn'
                      "
                      data-th-src="@{*{picture}}"
                      alt="Profile"
                    />

                    <div class="pl-4">
                      <div
                        class="text-base font-semibold text-gray-900 dark:text-white"
                        data-th-text="*{name}"
                      ></div>

                      <div
                        class="text-sm text-gray-500 mb-1"
                        data-th-text="*{email}"
                      ></div>

                      <span
                        class="inline-block px-2.5 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wider bg-blue-100 dark:bg-blue-900/30 border border-blue-200 dark:border-blue-800 text-blue-700 dark:text-blue-400"
                        data-th-text="*{category != null ? category : 'General'}"
                      >
                        General
                      </span>
                    </div>
                  </th>

                  <!-- Phone -->
                  <td class="px-6 py-4">
                    <div class="flex items-center gap-2">
                      <i class="fa-solid fa-phone text-gray-400"></i>

                      <span data-th-text="*{phoneNumber}"></span>
                    </div>
                  </td>

                  <!-- Links -->
                  <td class="px-6 py-4">
                    <div class="flex items-center gap-4 text-lg">
                      <!-- Favourite -->
                      <div data-th-if="${c.favourite}">
                        <a
                          data-th-href="@{/user/contacts/favourite(id=${c.id},favourite=false,page=${pageContact.number},size=${pageContact.size})}"
                        >
                          <i
                            class="fa-solid fa-star text-yellow-400 hover:text-yellow-500"
                          ></i>
                        </a>
                      </div>

                      <div data-th-unless="${c.favourite}">
                        <a
                          data-th-href="@{/user/contacts/favourite(id=${c.id},favourite=true,page=${pageContact.number},size=${pageContact.size})}"
                        >
                          <i
                            class="fa-regular fa-star text-gray-400 hover:text-yellow-400"
                          ></i>
                        </a>
                      </div>

                      <!-- Website -->
                      <a
                        data-th-if="${c.websiteLink != null and !c.websiteLink.isEmpty()}"
                        data-th-href="@{*{websiteLink}}"
                        target="_blank"
                      >
                        <i
                          class="fa-solid fa-link text-blue-500 hover:text-blue-700"
                        ></i>
                      </a>

                      <a
                        data-th-unless="${c.websiteLink != null and !c.websiteLink.isEmpty()}"
                        class="cursor-not-allowed opacity-40"
                      >
                        <i class="fa-solid fa-link"></i>
                      </a>

                      <!-- LinkedIn -->
                      <a
                        data-th-if="${c.linkedInLink != null and !c.linkedInLink.isEmpty()}"
                        data-th-href="@{*{linkedInLink}}"
                        target="_blank"
                      >
                        <i
                          class="fa-brands fa-linkedin text-blue-600 hover:text-blue-800"
                        ></i>
                      </a>

                      <a
                        data-th-unless="${c.linkedInLink != null and !c.linkedInLink.isEmpty()}"
                        class="cursor-not-allowed opacity-40"
                      >
                        <i class="fa-brands fa-linkedin"></i>
                      </a>
                    </div>
                  </td>

                  <!-- Actions -->
                  <td class="px-6 py-4">
                    <div class="flex items-center gap-4 text-lg">
                      <!-- Delete -->
                      <button
                        type="button"
                        th:onclick="deleteContact([[*{id}]], [[${pageContact.number}]], [[${pageContact.size}]])"
                      >
                        <i
                          class="fa-solid fa-trash text-red-500 hover:text-red-700"
                        ></i>
                      </button>

                      <!-- Edit -->
                      <a data-th-href="@{'/user/contacts/view/' + *{id}}">
                        <i
                          class="fa-solid fa-pen text-gray-600 hover:text-black dark:text-gray-300"
                        ></i>
                      </a>

                      <!-- View -->
                      <button data-th-onclick="loadContactData([[${c.id}]])">
                        <i
                          class="fa-solid fa-eye text-blue-500 hover:text-blue-700"
                        ></i>
                      </button>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <!-- Pagination -->
          <div
            th:if="${pageContact.totalPages > 0}"
            class="p-6 flex justify-center"
          >
            <nav>
              <ul class="flex items-center gap-2 flex-wrap">
                <li data-th-unless="${pageContact.first}">
                  <a
                    th:if="${customHeading != null}"
                    th:href="@{'/user/contacts/tag?type=' + ${param.type} + '&page=' + ${pageContact.number - 1} + '&size=' + ${pageContact.size}}"
                    class="px-4 py-2 rounded-xl border bg-white hover:bg-gray-100 dark:bg-gray-800 dark:border-gray-700 dark:hover:bg-gray-700"
                  >
                    Previous
                  </a>
                  <a
                    th:unless="${customHeading != null}"
                    th:href="@{'/user/contacts?page=' + ${pageContact.number - 1} + '&size=' + ${pageContact.size}}"
                    class="px-4 py-2 rounded-xl border bg-white hover:bg-gray-100 dark:bg-gray-800 dark:border-gray-700 dark:hover:bg-gray-700"
                  >
                    Previous
                  </a>
                </li>

                <li
                  data-th-each="index : ${#numbers.sequence(0, pageContact.totalPages-1)}"
                >
                  <a
                    th:if="${customHeading != null}"
                    data-th-href="@{'/user/contacts/tag?type=' + ${param.type} + '&size=' + ${pageSize} + '&page=' + ${index}}"
                    class="px-4 py-2 rounded-xl border transition-all duration-200"
                    th:classappend="${index == pageContact.number} ? 'bg-blue-600 text-white border-blue-600' : 'bg-white dark:bg-gray-800 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-700'"
                  >
                    <span data-th-text="${index + 1}"></span>
                  </a>

                  <a
                    th:unless="${customHeading != null}"
                    data-th-href="@{'/user/contacts?size=' + ${pageSize} + '&page=' + ${index}}"
                    class="px-4 py-2 rounded-xl border transition-all duration-200"
                    th:classappend="${index == pageContact.number} ? 'bg-blue-600 text-white border-blue-600' : 'bg-white dark:bg-gray-800 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-700'"
                  >
                    <span data-th-text="${index + 1}"></span>
                  </a>
                </li>

                <li data-th-unless="${pageContact.last}">
                  <a
                    th:if="${customHeading != null}"
                    th:href="@{'/user/contacts/tag?type=' + ${param.type} + '&page=' + ${pageContact.number + 1} + '&size=' + ${pageContact.size}}"
                    class="px-4 py-2 rounded-xl border bg-white hover:bg-gray-100 dark:bg-gray-800 dark:border-gray-700 dark:hover:bg-gray-700"
                  >
                    Next
                  </a>
                  <a
                    th:unless="${customHeading != null}"
                    th:href="@{'/user/contacts?page=' + ${pageContact.number + 1} + '&size=' + ${pageContact.size}}"
                    class="px-4 py-2 rounded-xl border bg-white hover:bg-gray-100 dark:bg-gray-800 dark:border-gray-700 dark:hover:bg-gray-700"
                  >
                    Next
                  </a>
                </li>
              </ul>
            </nav>
          </div>

          <!-- No Results -->
          <div
            data-th-if="${pageContact.totalElements <= 0}"
            class="text-center py-10"
          >
            <h1 class="text-3xl font-bold text-gray-700 dark:text-gray-300">
              No Results Found
            </h1>
          </div>
        </div>

        <!-- Contact Modal -->
        <div data-th-replace="~{user/contact_modals::contact}"></div>
      </div>
    </div>

    <script data-th-src="@{'/js/contact.js'}"></script>
  </body>
</html>
